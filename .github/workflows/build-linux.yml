name: Build SpeedyNote Linux Packages

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (e.g., v1.2.1, v2.0.0-beta)
  workflow_dispatch:  # Allow manual trigger  

# Required for release uploads
permissions:
  contents: write

jobs:
  # Build DEB inside a Debian 12 (Bookworm) container.
  # Rationale: glibc and Qt6 are forward-compatible only. Building on the
  # OLDEST supported target (Debian 12: glibc 2.36, Qt 6.4) yields a single
  # .deb that installs on Debian 12/13 and Ubuntu 24.04/25.04/26.04.
  # The `libqt6core6t64 | libqt6core6` alternate deps in build-package.sh
  # handle the Debian/Ubuntu t64 transition at install time.
  build-deb:
    name: Build DEB Package (amd64, Debian 12 base)
    runs-on: ubuntu-24.04
    container:
      image: debian:12-slim

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          # debian:12-slim has no compiler by default; build-essential pulls
          # in gcc, g++, libc6-dev, make, and dpkg-dev.
          apt-get install -y --no-install-recommends \
            ca-certificates \
            git \
            curl \
            file \
            sudo \
            build-essential \
            cmake \
            pkg-config \
            qt6-base-dev \
            qt6-tools-dev \
            libqt6svg6-dev \
            libsdl2-dev \
            libasound2-dev \
            libmupdf-dev \
            libharfbuzz-dev \
            libfreetype-dev \
            libjpeg-dev \
            libopenjp2-7-dev \
            libjbig2dec0-dev \
            libgumbo-dev \
            libmujs-dev \
            devscripts

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and create DEB package
        run: |
          chmod +x ./build-package.sh
          ./build-package.sh --deb

      - name: Verify glibc compat (sanity check)
        run: |
          MAX_GLIBC=$(objdump -T build/speedynote 2>/dev/null \
            | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -V | tail -1)
          echo "Highest GLIBC symbol required: ${MAX_GLIBC:-none}"
          # Debian 12 ships glibc 2.36; warn if we somehow exceed it.
          if [ -n "$MAX_GLIBC" ]; then
            VER="${MAX_GLIBC#GLIBC_}"
            awk -v v="$VER" 'BEGIN{
              split(v,a,".");
              if (a[1]>2 || (a[1]==2 && a[2]>36)) {
                print "WARNING: binary requires glibc " v " > 2.36 (Debian 12)";
                exit 0;
              }
            }'
          fi

      - name: Audit dynamic library dependencies
        run: |
          echo "=== NEEDED entries (DT_NEEDED) ==="
          objdump -p build/speedynote | grep NEEDED || true
          echo
          echo "=== Checking each NEEDED lib has a Depends: entry in the .deb ==="
          DEB_FILE=$(ls speedynote_*.deb 2>/dev/null | head -1)
          if [ -z "$DEB_FILE" ]; then
            echo "No .deb found — skipping audit."
            exit 0
          fi
          DEPENDS=$(dpkg-deb -f "$DEB_FILE" Depends)
          echo "Depends: $DEPENDS"
          echo
          MISSING=0
          for lib in $(objdump -p build/speedynote | awk '/NEEDED/ {print $2}'); do
            # Resolve which package owns this SONAME on the build host.
            OWNER=$(dpkg -S "/$lib" 2>/dev/null \
                  || dpkg -S "*/$lib" 2>/dev/null \
                  || true)
            OWNER_PKG=$(echo "$OWNER" | head -1 | cut -d: -f1)
            if [ -z "$OWNER_PKG" ]; then
              echo "  [skip] $lib  (provided by glibc/ld.so or unowned)"
              continue
            fi
            # Strip :amd64 / :arm64 architecture suffix for comparison.
            OWNER_PKG_BASE="${OWNER_PKG%%:*}"
            if echo "$DEPENDS" | grep -qE "(^|[ ,|])$OWNER_PKG_BASE([ ,|]|$)"; then
              echo "  [ok]   $lib  ←  $OWNER_PKG_BASE"
            else
              echo "  [MISS] $lib  ←  $OWNER_PKG_BASE  (not in Depends:)"
              MISSING=$((MISSING+1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo
            echo "WARNING: $MISSING dynamic dependency/dependencies not declared."
            echo "Update get_dependencies() in build-package.sh."
            # Don't fail the build — just visible in logs.
          fi

      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: speedynote-deb-amd64
          path: "*.deb"

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: "*.deb"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

